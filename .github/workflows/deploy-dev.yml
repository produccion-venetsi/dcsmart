name: Deploy to Firebase Hosting (Dev)

on:
  push:
    branches:
      - dev

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Deploy a Firebase Hosting (canal dev)
        run: npx firebase-tools@latest hosting:channel:deploy dev --project dc-smart-mvp --token ${{ secrets.FIRABASETOKEN }}

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Autenticar en Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configurar Docker para GCR
        run: gcloud auth configure-docker --quiet

      - name: Build imagen Docker
        run: docker build -t gcr.io/dc-smart-mvp/dcsmart-backend:${{ github.sha }} backend/

      - name: Push imagen Docker
        run: docker push gcr.io/dc-smart-mvp/dcsmart-backend:${{ github.sha }}

      - name: Deploy a Cloud Run
        run: |
          gcloud run deploy dcsmart-backend \
            --image gcr.io/dc-smart-mvp/dcsmart-backend:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --env-vars-file backend/.env.cloudrun.yaml \
            --add-cloudsql-instances dc-smart-mvp:us-central1:dcsmart-mvp-insta \
            --allow-unauthenticated \
            --project dc-smart-mvp \
            --quiet
