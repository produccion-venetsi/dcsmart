name: Deploy to Firebase Hosting (Dev)

on:
  push:
    branches:
      - dev

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_GIT_SHA: ${{ github.sha }}
          VITE_API_URL: ${{ secrets.BACKEND_URL }}/api

      - name: Autenticar en Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy a Firebase Hosting (canal dev)
        run: npx firebase-tools@latest hosting:channel:deploy dev --project dc-smart-mvp

  deploy-backend:
    runs-on: ubuntu-latest
    env:
      IMAGE: us-central1-docker.pkg.dev/dc-smart-mvp/dcsmart/dcsmart-backend
    steps:
      - uses: actions/checkout@v4

      - name: Autenticar en Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build imagen Docker
        run: docker build -t ${{ env.IMAGE }}:${{ github.sha }} backend/

      - name: Push imagen Docker
        run: docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Crear env vars file
        env:
          CLOUDRUN_ENV_YAML: ${{ secrets.CLOUDRUN_ENV_YAML }}
        run: printf '%s' "$CLOUDRUN_ENV_YAML" > backend/.env.cloudrun.yaml

      - name: Deploy a Cloud Run
        run: |
          gcloud run deploy dcsmart-backend \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --env-vars-file backend/.env.cloudrun.yaml \
            --add-cloudsql-instances dc-smart-mvp:us-central1:dcsmart-mvp-insta \
            --allow-unauthenticated \
            --project dc-smart-mvp \
            --quiet
